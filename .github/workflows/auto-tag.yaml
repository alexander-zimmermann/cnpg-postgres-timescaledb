name: Auto Tag

on:
  push:
    branches: [main]
    paths: ["Dockerfile"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Derive tag from Dockerfile and push if new
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pg=$(grep -oP 'cloudnative-pg/postgresql:\K[0-9]+(\.[0-9]+)?' Dockerfile)
          ts=$(grep -oP 'timescaledb-2-postgresql-[^=]+=\K[0-9]+\.[0-9]+' Dockerfile)
          tk=""
          grep -q 'timescaledb-toolkit-postgresql' Dockerfile && tk="-tk"
          tag="${pg}-ts${ts}${tk}"
          if [ -z "$pg" ] || [ -z "$ts" ]; then
            echo "Could not parse pg/ts version from Dockerfile" >&2
            exit 1
          fi
          if git tag -l "$tag" | grep -q .; then
            echo "Tag $tag already exists; nothing to do."
            exit 0
          fi
          git tag "$tag" # app push triggers release.yaml
          git push origin "$tag"
          gh release create "$tag" --generate-notes --title "$tag"
